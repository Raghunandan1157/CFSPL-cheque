<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFSPL Cheque Tracker – Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">
        <!-- Cheque/Document icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm4-4h8v2h-8z"/>
        </svg>
      </div>
      <h1>CFSPL Cheque Tracker</h1>
      <p>Branch Management System</p>
    </div>

    <div id="loginAlert" class="alert alert-error" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      <span id="loginAlertText"></span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="branchSelect">Select Branch</label>
        <select id="branchSelect" required>
          <option value="">— Choose your branch —</option>
          <option value="Head Office">Head Office</option>
          <option value="Andheri Branch">Andheri Branch</option>
          <option value="Borivali Branch">Borivali Branch</option>
          <option value="Dadar Branch">Dadar Branch</option>
          <option value="Thane Branch">Thane Branch</option>
          <option value="Pune Branch">Pune Branch</option>
          <option value="Nashik Branch">Nashik Branch</option>
          <option value="Nagpur Branch">Nagpur Branch</option>
          <option value="Aurangabad Branch">Aurangabad Branch</option>
          <option value="Kolhapur Branch">Kolhapur Branch</option>
        </select>
      </div>

      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input
          type="password"
          id="passwordInput"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary">
        Sign In to Dashboard
      </button>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
