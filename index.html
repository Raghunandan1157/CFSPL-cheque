<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFSPL Cheque Tracker – Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <div class="login-card" style="position:relative;">
    <button class="theme-toggle" title="Toggle theme" style="position:absolute;top:16px;right:16px;">
      <svg class="icon-moon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <div class="login-logo">
      <div class="logo-icon">
        <!-- Cheque/Document icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm4-4h8v2h-8z"/>
        </svg>
      </div>
      <h1>CFSPL Cheque Tracker</h1>
      <p>Branch Management System</p>
    </div>

    <div id="loginAlert" class="alert alert-error" role="alert">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
      <span id="loginAlertText"></span>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="branchSelect">Select Branch</label>
        <select id="branchSelect" required>
          <option value="">— Choose your branch —</option>
          <option value="Head Office">Head Office</option>
          <option value="Andheri Branch">Andheri Branch</option>
          <option value="Borivali Branch">Borivali Branch</option>
          <option value="Dadar Branch">Dadar Branch</option>
          <option value="Thane Branch">Thane Branch</option>
          <option value="Pune Branch">Pune Branch</option>
          <option value="Nashik Branch">Nashik Branch</option>
          <option value="Nagpur Branch">Nagpur Branch</option>
          <option value="Aurangabad Branch">Aurangabad Branch</option>
          <option value="Kolhapur Branch">Kolhapur Branch</option>
        </select>
      </div>

      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input
          type="password"
          id="passwordInput"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary">
        Sign In to Dashboard
      </button>
    </form>

    <div class="admin-divider">
      <span>or</span>
    </div>

    <button class="btn btn-admin" id="adminLoginBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
      </svg>
      Admin Panel
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
