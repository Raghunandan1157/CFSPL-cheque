<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFSPL Cheque Tracker – Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dashboard-page">

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm4-4h8v2h-8z"/>
        </svg>
      </div>
      <div class="brand-text">
        <h2>CFSPL Cheque Tracker</h2>
        <span>Branch Management System</span>
      </div>
    </div>

    <div class="header-right">
      <button class="theme-toggle" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="branch-badge" id="headerBranch">Loading...</div>
      <button class="btn-logout" id="logoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
        Logout
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">

    <div class="page-title">
      <h3>Cheque Entry</h3>
      <p id="branchSubtitle">Manage cheque records for your branch</p>
    </div>

    <!-- Entry Form Card -->
    <div class="card">
      <div class="card-title">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        New Entry
      </div>

      <div id="formAlert" class="alert alert-success" role="alert">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14l-4-4 1.41-1.41L10 13.17l6.59-6.59L18 8l-8 8z"/>
        </svg>
        <span id="formAlertText">Record saved successfully!</span>
      </div>

      <form id="entryForm" novalidate>
        <div class="form-grid">

          <div class="form-group">
            <label for="customerName">Customer Name</label>
            <input type="text" id="customerName" placeholder="Enter customer full name" required />
          </div>

          <div class="form-group">
            <label for="customerLoanId">Customer Loan ID</label>
            <input type="text" id="customerLoanId" placeholder="e.g. LN-2024-00123" required />
          </div>

          <div class="form-group full-width">
            <label>Cheque Received?</label>
            <div class="radio-group">
              <label class="radio-label" id="radioLabelYes">
                <input type="radio" name="chequeReceived" value="Yes" id="radioYes" />
                Yes – Cheque Received
              </label>
              <label class="radio-label" id="radioLabelNo">
                <input type="radio" name="chequeReceived" value="No" id="radioNo" />
                No – Not Received
              </label>
            </div>
          </div>

          <!-- Conditional: Cheque NOT received -->
          <div class="form-group full-width conditional-field" id="fieldReason">
            <label for="chequeReason">Reason Cheque Not Received</label>
            <textarea
              id="chequeReason"
              placeholder="Describe why the cheque was not received..."
            ></textarea>
          </div>

          <!-- Conditional: Cheque received -->
          <div class="form-group full-width conditional-field" id="fieldLocation">
            <label for="chequeLocation">Where is the Cheque Kept?</label>
            <input
              type="text"
              id="chequeLocation"
              placeholder="e.g. Branch safe, File cabinet A-3..."
            />
          </div>

          <!-- Conditional: Attach cheque photo -->
          <div class="form-group full-width conditional-field" id="fieldPhoto">
            <label>Attach Cheque Photo</label>
            <div class="photo-upload-box" id="photoDropZone">
              <input type="file" id="chequePhoto" accept="image/*" capture="environment" />
              <div class="photo-upload-placeholder" id="photoPlaceholder">
                <svg viewBox="0 0 24 24" width="36" height="36" fill="currentColor">
                  <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                </svg>
                <p>Click or drag &amp; drop cheque photo here</p>
                <span>Supports JPG, PNG (max 5 MB)</span>
              </div>
              <div class="photo-preview" id="photoPreview">
                <img id="photoPreviewImg" alt="Cheque preview" />
                <button type="button" class="photo-remove-btn" id="photoRemoveBtn">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                  Remove
                </button>
              </div>
            </div>
          </div>

        </div>

        <div class="form-actions">
          <button type="submit" class="btn-save">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm2 16H5V5h11.17L19 7.83V19zm-7-7c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zM6 6h9v4H6z"/>
            </svg>
            Save Record
          </button>
        </div>
      </form>
    </div>

    <!-- Records Table Card -->
    <div class="card records-section">
      <div class="card-title">
        <span style="display:flex;align-items:center;gap:8px;">
          <svg viewBox="0 0 24 24" width="16" height="16" style="fill:var(--gold)"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
          Saved Records
        </span>
        <span class="record-count" id="recordCount">0 records</span>
      </div>

      <div class="table-wrapper">
        <div id="recordsContainer">
          <!-- Table or empty state rendered by JS -->
        </div>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
