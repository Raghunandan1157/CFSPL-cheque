<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - NLPL IT Support</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>NLPL IT</h2>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" onclick="App.filterTasks('all')">All Tasks</div>
                <div class="nav-item" onclick="App.filterTasks('progress')">In Progress</div>
                <div class="nav-item" onclick="App.filterTasks('completed')">Completed</div>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-danger" onclick="Auth.logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="toggleSidebar" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">☰</button>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="App.searchTasks()">
                </div>
                <div class="user-info">
                    <span id="displayUser"></span>
                </div>
            </header>

            <div class="content-body">
                <h1 id="pageTitle">All Tasks</h1>
                <div class="task-grid" id="taskGrid">
                    <!-- Tasks will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Add Button -->
    <button class="floating-btn" onclick="App.openModal()">+</button>

    <!-- Add/Edit Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button class="close-modal" onclick="App.closeModal()">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                
                <div class="grid-2">
                    <div class="form-group">
                        <label>Task ID</label>
                        <input type="text" id="displayTaskId" readonly>
                    </div>
                    <div class="form-group">
                        <label>Timestamp</label>
                        <input type="text" id="taskTimestamp" readonly>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Branch</label>
                        <select id="branch" required>
                            <option value="">Select Branch</option>
                            <option value="Mumbai">Mumbai</option>
                            <option value="Delhi">Delhi</option>
                            <option value="Bangalore">Bangalore</option>
                            <option value="Kolkata">Kolkata</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>HO / CO</label>
                        <select id="hoco" onchange="App.toggleStaffFields()" required>
                            <option value="None">None</option>
                            <option value="HO">Head Office (HO)</option>
                            <option value="CO">Corporate Office (CO)</option>
                        </select>
                    </div>
                </div>

                <div id="staffFields" class="hidden">
                    <div class="grid-2">
                        <div class="form-group">
                            <label>Staff Name</label>
                            <input type="text" id="staffName">
                        </div>
                        <div class="form-group">
                            <label>Staff ID</label>
                            <input type="text" id="staffId">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Issue Type</label>
                    <select id="issueType" required>
                        <option value="Software">Software</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Both">Both</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Issue Description</label>
                    <input type="text" id="issueDescription" required>
                </div>

                <div class="form-group">
                    <label>Solution (Short)</label>
                    <input type="text" id="solution">
                </div>

                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea id="detailedDescription" rows="3"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="amount" value="0">
                    </div>
                    <div class="form-group" id="completionTimeGroup" class="hidden">
                        <label>Completion Time</label>
                        <input type="text" id="completionTimestamp" readonly>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="App.closeModal()">Cancel</button>
                    <button type="button" class="btn btn-danger hidden" id="deleteBtn" onclick="App.deleteTask()">Delete</button>
                    <button type="submit" class="btn" id="saveBtn">Save</button>
                    <button type="button" class="btn btn-success" id="completeBtn" onclick="App.completeTask()">Task Completed</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="auth.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Check authentication on load
        Auth.checkAuth();
        document.getElementById('displayUser').textContent = Auth.getUser()?.userId;
    </script>
</body>
</html>
