<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFSPL Cheque Tracker – Admin Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="admin-page">

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm4-4h8v2h-8z"/>
        </svg>
      </div>
      <div>
        <h2>CFSPL Admin</h2>
        <span>Cheque Tracker</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="sidebar-link active" data-page="overview" id="navOverview">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg>
        Overview
      </button>
      <button class="sidebar-link" data-page="report" id="navReport">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        Report
      </button>
    </nav>

    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <span style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;">Theme</span>
        <button class="theme-toggle" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
      <button class="btn-logout" id="adminLogoutBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
        Back to Login
      </button>
    </div>
  </aside>

  <!-- Mobile Header -->
  <div class="admin-mobile-header">
    <button class="mobile-menu-btn" id="mobileMenuBtn">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <span>CFSPL Admin</span>
    <button class="theme-toggle" title="Toggle theme" style="margin-left:auto;">
      <svg class="icon-moon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg class="icon-sun" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <!-- Main Content -->
  <main class="admin-main">

    <!-- OVERVIEW PAGE -->
    <div class="admin-content active" id="pageOverview">
      <div class="page-title">
        <h3>Overview</h3>
        <p>Summary of all cheque records across branches</p>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid">
        <!-- Rendered by JS -->
      </div>

      <!-- Branch Breakdown -->
      <div class="card" style="margin-top:28px;">
        <div class="card-title">
          <svg viewBox="0 0 24 24" width="16" height="16" style="fill:var(--gold)"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          Branch Breakdown
        </div>
        <div class="table-wrapper">
          <div id="branchBreakdownContainer"></div>
        </div>
      </div>
    </div>

    <!-- REPORT PAGE -->
    <div class="admin-content" id="pageReport">
      <div class="page-title">
        <h3>Report</h3>
        <p>All records with column filtering — click any column header to filter</p>
      </div>

      <!-- Active Filters Bar -->
      <div class="active-filters" id="activeFilters" style="display:none;">
        <span class="filters-label">Active Filters:</span>
        <div class="filter-tags" id="filterTags"></div>
        <button class="clear-all-filters" id="clearAllFilters">Clear All</button>
      </div>

      <div class="card">
        <div class="card-title" style="justify-content:space-between;">
          <span style="display:flex;align-items:center;gap:8px;">
            <svg viewBox="0 0 24 24" width="16" height="16" style="fill:var(--gold)"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            All Records
          </span>
          <span class="record-count" id="adminRecordCount">0 records</span>
        </div>

        <div class="table-wrapper">
          <div id="adminReportContainer">
            <!-- Table rendered by JS -->
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Filter Dropdown (shared, positioned dynamically) -->
  <div class="filter-dropdown" id="filterDropdown" style="display:none;">
    <div class="filter-dropdown-header">
      <span id="filterDropdownTitle">Filter</span>
      <button class="filter-close-btn" id="filterCloseBtn">&times;</button>
    </div>
    <input type="text" class="filter-search" id="filterSearch" placeholder="Search..." />
    <div class="filter-options" id="filterOptions"></div>
    <div class="filter-actions">
      <button class="filter-apply-btn" id="filterApplyBtn">Apply</button>
      <button class="filter-reset-btn" id="filterResetBtn">Reset</button>
    </div>
  </div>
  <div class="filter-overlay" id="filterOverlay" style="display:none;"></div>

  <script src="app.js"></script>
</body>
</html>
